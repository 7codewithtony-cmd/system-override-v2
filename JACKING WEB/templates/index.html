<!DOCTYPE html>
<html>
<head>
    <title>PETER EXPLOIT HUB v2.0</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; text-align: center; }
        .box { border: 2px solid #00ff41; padding: 20px; display: inline-block; border-radius: 10px; margin-top: 30px; box-shadow: 0 0 15px #00ff41; background: #000; }
        input { background: #111; border: 1px solid #00ff41; color: #fff; padding: 10px; width: 80%; margin: 5px; border-radius: 5px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn { padding: 12px; border: 1px solid #00ff41; background: transparent; color: #00ff41; cursor: pointer; font-weight: bold; border-radius: 5px; }
        .btn:hover { background: #00ff41; color: #000; }
        .stop { border-color: #ff0000; color: #ff0000; margin-top: 15px; width: 100%; }
        .status-panel { margin-top: 15px; font-size: 0.9em; border-top: 1px solid #333; padding-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>💀 PETER EXPLOIT HUB 💀</h2>
        
        <input type="text" id="id" placeholder="TELEGRAM ID">
        <input type="text" id="token" placeholder="BOT TOKEN">

        <div class="status-panel">
            HITS: <span id="hits">0</span> | BAD: <span id="bad">0</span><br>
            ACTIVE: <span id="active">None</span>
        </div>

        <div class="grid">
            <button class="btn" onclick="start('legacy')">🚀 LEGACY (2k12)</button>
            <button class="btn" onclick="start('meta')">💎 META/BIZZ</button>
            <button class="btn" onclick="start('toxic')">💀 TOXIC ACTIVE</button>
            <button class="btn" onclick="start('deep')">🌌 DEEP PERMA</button>
        </div>

        <button class="btn stop" onclick="stopAll()">TERMINATE ALL EXPLOITS</button>
    </div>

    <script>
        function start(script) {
            const id = document.getElementById('id').value;
            const token = document.getElementById('token').value;
            fetch('/start', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({script: script, id: id, token: token})
            }).then(r => r.json()).then(d => alert(d.message));
        }

        function stopAll() {
            fetch('/stop', {method: 'POST'}).then(r => r.json()).then(d => alert(d.message));
        }

        setInterval(() => {
            fetch('/get_stats').then(r => r.json()).then(data => {
                document.getElementById('hits').innerText = data.hits;
                document.getElementById('bad').innerText = data.bad;
                document.getElementById('active').innerText = data.active_script;
            });
        }, 2000);
    </script>
</body>
</html>
