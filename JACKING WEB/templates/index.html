<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM OVERRIDE v2.0</title>
    <style>
        canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; }
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; text-align: center; margin: 0; padding: 10px; overflow-x: hidden; }
        .logo { font-size: 1.8em; font-weight: bold; color: #00ff00; text-shadow: 0 0 15px #00ff00; margin: 15px 0; }
        .panel { border: 2px solid #00ff00; padding: 20px; display: inline-block; border-radius: 12px; background-color: rgba(0,0,0,0.85); width: 95%; max-width: 460px; box-shadow: 0 0 20px #00ff00; }
        .tg-link { display: block; width: 90%; margin: 0 auto 15px; padding: 12px; background: #0088cc; color: #fff; text-decoration: none; font-weight: bold; border-radius: 5px; box-shadow: 0 0 10px #0088cc; }
        
        /* Two Box Stats Section */
        .stats-container { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 15px; }
        .stat-card { flex: 1; padding: 15px; border-radius: 8px; border: 1px solid; font-size: 1.2em; font-weight: bold; background: rgba(0,0,0,0.6); }
        .hit-box { border-color: #00ff00; color: #00ff00; box-shadow: inset 0 0 10px rgba(0,255,0,0.2); }
        .fail-box { border-color: #ff4444; color: #ff4444; box-shadow: inset 0 0 10px rgba(255,68,68,0.2); }
        .label { font-size: 0.7em; display: block; margin-bottom: 5px; opacity: 0.7; letter-spacing: 1px; }

        /* Status Blinker */
        .status-active { margin: 10px 0; font-weight: bold; display: none; color: #00ff00; animation: blinker 0.8s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; text-shadow: 0 0 15px #00ff00; } }

        /* Clean Inputs */
        input { background: transparent; border: 1px solid #00ff00; color: #fff; padding: 12px; margin: 8px 0; border-radius: 6px; width: 90%; outline: none; font-size: 1em; text-align: center; }
        input::placeholder { color: rgba(0,255,0,0.3); }

        .btn { display: block; width: 95%; padding: 12px; margin: 10px auto; border: 1px solid #00ff00; background: transparent; color: #00ff00; cursor: pointer; border-radius: 6px; font-weight: bold; }
        .btn:hover { background: #00ff00; color: #000; }
        .combo-btn { border-color: #ff00ff; color: #ff00ff; }
        .combo-btn:hover { background: #ff00ff; color: #000; box-shadow: 0 0 15px #ff00ff; }
        .stop-btn { border-color: #ff0000; color: #ff0000; margin-top: 15px; }

        @media (max-width: 600px) { .panel { width: 98%; } }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div class="logo">SYSTEM OVERRIDE v2.0</div>
    <div class="panel">
        <a href="https://t.me/your_channel" target="_blank" class="tg-link">JOIN TELEGRAM CHANNEL</a>
        
        <div class="stats-container">
            <div class="stat-card hit-box">
                <span class="label">SUCCESS HITS</span>
                <span id="hits">0</span>
            </div>
            <div class="stat-card fail-box">
                <span class="label">FAIL (BAD)</span>
                <span id="bad">0</span>
            </div>
        </div>

        <div class="status-active" id="status_msg">⚡ EXPLOIT IS ACTIVE ⚡</div>
        
        <input type="text" id="tg_id" placeholder="Enter Telegram ID">
        <input type="text" id="tg_token" placeholder="Enter Bot Token">
        
        <div style="color: #ff00ff; font-size: 0.8em; margin: 10px 0;">-- ADVANCED COMBO --</div>
        <button class="btn combo-btn" onclick="start('legacy')">🚀 PETER LEGACY (2k12-14)</button>
        <button class="btn combo-btn" onclick="start('meta')">💎 PETER META/BIZZ</button>
        <button class="btn combo-btn" onclick="start('toxic')">💀 PETER TOXIC ACTIVE</button>
        <button class="btn combo-btn" onclick="start('deep')">🌌 PETER DEEP PERMA</button>

        <div style="color: #00ff00; font-size: 0.8em; margin: 10px 0;">-- SINGLE FILES --</div>
        <button class="btn" onclick="start('btn1')">high followers 😍 by peter (2).py</button>
        <button class="btn" onclick="start('btn3')">high followers file by team tx.py</button>
        
        <button class="btn stop-btn" onclick="stopAll()">TERMINATE ALL EXPLOITS</button>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        const fontSize = 16; const columns = canvas.width / fontSize;
        const rain = Array(Math.floor(columns)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0"; ctx.font = fontSize + "px Courier New";
            for (let i = 0; i < rain.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, rain[i] * fontSize);
                if (rain[i] * fontSize > canvas.height && Math.random() > 0.975) rain[i] = 0;
                rain[i]++;
            }
        }
        setInterval(draw, 35);

        function start(script) {
            const id = document.getElementById('tg_id').value;
            const token = document.getElementById('tg_token').value;
            if(!id || !token) { alert("ID aur Token empty hai!"); return; }
            fetch('/start', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({script: script, id: id, token: token})
            }).then(r => r.json()).then(d => {
                document.getElementById('status_msg').style.display = 'block';
            });
        }

        function stopAll() {
            fetch('/stop', {method: 'POST'}).then(r => r.json()).then(d => {
                document.getElementById('status_msg').style.display = 'none';
            });
        }

        setInterval(() => {
            fetch('/get_stats').then(r => r.json()).then(data => {
                document.getElementById('hits').innerText = data.hits;
                document.getElementById('bad').innerText = data.bad;
                if(data.active_script !== "None") document.getElementById('status_msg').style.display = 'block';
                else document.getElementById('status_msg').style.display = 'none';
            });
        }, 2000);
    </script>
</body>
</html>
