<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM OVERRIDE v2.0</title>
    <style>
        canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; }
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; margin: 0; padding: 10px; text-align: center; }
        .panel { border: 2px solid #00ff00; padding: 15px; display: inline-block; border-radius: 12px; background-color: rgba(0,0,0,0.9); width: 95%; max-width: 480px; box-shadow: 0 0 20px #00ff00; margin-top: 5px; }
        .tg-link { display: block; width: 90%; margin: 0 auto 15px; padding: 12px; background: #0088cc; color: #fff; text-decoration: none; font-weight: bold; border-radius: 5px; box-shadow: 0 0 15px #0088cc; font-size: 1em; }
        .terminal { background: #000; border: 1px solid #00ff00; color: #00ff00; padding: 10px; text-align: left; font-size: 0.85em; margin-bottom: 15px; height: 50px; overflow: hidden; box-shadow: inset 0 0 10px #00ff00; }
        .stats-container { display: flex; gap: 10px; margin-bottom: 15px; }
        .stat-card { flex: 1; border: 1px solid #00ff00; padding: 10px; border-radius: 8px; background: rgba(0,255,0,0.05); }
        .hit-text { color: #00ff00; font-size: 1.3em; font-weight: bold; }
        .fail-text { color: #ff4444; font-size: 1.3em; font-weight: bold; }
        .label { font-size: 0.65em; display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .status-active { font-weight: bold; color: #00ff00; margin: 10px 0; display: none; animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        input { background: transparent; border: 1px solid #00ff00; color: #fff; padding: 12px; margin: 5px 0; border-radius: 6px; width: 90%; outline: none; text-align: center; }
        .btn { display: block; width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #00ff00; background: transparent; color: #00ff00; cursor: pointer; font-weight: bold; border-radius: 6px; font-size: 0.85em; transition: 0.3s; }
        .btn:hover { background: #00ff00; color: #000; }
        .combo-btn { border-color: #ff00ff; color: #ff00ff; }
        .combo-btn:hover { background: #ff00ff; color: #000; }
        .stop-btn { border-color: #ff0000; color: #ff0000; margin-top: 15px; }
        .section-title { font-size: 0.75em; color: #666; margin: 15px 0 5px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div class="panel">
        <a href="https://t.me/your_channel" target="_blank" class="tg-link">JOIN TELEGRAM CHANNEL</a>
        <div class="terminal" id="term">[SYSTEM] Waiting for instruction...</div>
        <div class="stats-container">
            <div class="stat-card"><span class="label">Total Hits</span><span class="hit-text" id="hits">0</span></div>
            <div class="stat-card" style="border-color: #ff4444;"><span class="label">Failed</span><span class="fail-text" id="bad">0</span></div>
        </div>
        <div class="status-active" id="status_msg">⚡ EXPLOIT IS ACTIVE ⚡</div>
        <input type="text" id="tg_id" placeholder="Enter Telegram ID">
        <input type="text" id="tg_token" placeholder="Enter Bot Token">

        <div class="section-title">--- Advanced Combo Tools ---</div>
        <button class="btn combo-btn" onclick="start('legacy')">EXPLOIT: LEGACY CHECK</button>
        <button class="btn combo-btn" onclick="start('meta')">EXPLOIT: BIZZ COMBO</button>
        <button class="btn combo-btn" onclick="start('toxic')">EXPLOIT: TOXIC ACTIVE</button>
        <button class="btn combo-btn" onclick="start('deep')">EXPLOIT: DEEP PERMA</button>

        <div class="section-title">--- Single Exploit Files ---</div>
        <button class="btn" onclick="start('btn1')">EXPLOIT: HIGH FOLLOWERS</button>
        <button class="btn" onclick="start('btn3')">EXPLOIT: TEAM TX CORE</button>
        <button class="btn" onclick="start('btn_2k14')">EXPLOIT: 2k14-15 HYBRID</button>
        <button class="btn" onclick="start('btn_5l')">EXPLOIT: 5L USERNAME</button>
        <button class="btn" onclick="start('btn_2k13')">EXPLOIT: 2k13-15 BY PETER</button>
        
        <button class="btn stop-btn" onclick="stopAll()">TERMINATE ALL EXPLOITS</button>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        const fontSize = 16; const columns = canvas.width / fontSize;
        const rain = Array(Math.floor(columns)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0"; ctx.font = fontSize + "px Courier New";
            for (let i = 0; i < rain.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, rain[i] * fontSize);
                if (rain[i] * fontSize > canvas.height && Math.random() > 0.975) rain[i] = 0;
                rain[i]++;
            }
        }
        setInterval(draw, 35);

        function start(script) {
            const id = document.getElementById('tg_id').value;
            const token = document.getElementById('tg_token').value;
            if(!id || !token) { alert("ID/Token missing!"); return; }
            document.getElementById('term').innerText = "[SYSTEM] Starting " + script + "...";
            fetch('/start', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({script: script, id: id, token: token})
            });
        }

        function stopAll() {
            fetch('/stop', {method: 'POST'}).then(() => {
                document.getElementById('term').innerText = "[SYSTEM] Terminated.";
                document.getElementById('status_msg').style.display = 'none';
            });
        }

        setInterval(() => {
            fetch('/get_stats').then(r => r.json()).then(data => {
                document.getElementById('hits').innerText = data.hits;
                document.getElementById('bad').innerText = data.bad;
                if(data.active_script !== "None") {
                    document.getElementById('status_msg').style.display = 'block';
                    document.getElementById('term').innerText = "[RUNNING] " + data.active_script;
                } else {
                    document.getElementById('status_msg').style.display = 'none';
                }
            });
        }, 2000);
    </script>
</body>
</html>
