<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM OVERRIDE v2.0</title>
    <style>
        /* Matrix Rain Background */
        canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; }
        
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; text-align: center; margin: 0; padding: 10px; overflow-x: hidden; }
        
        .logo { font-size: 2em; font-weight: bold; color: #00ff00; text-shadow: 0 0 15px #00ff00; margin: 20px 0; }
        
        .panel { border: 2px solid #00ff00; padding: 20px; display: inline-block; border-radius: 12px; background-color: rgba(0,0,0,0.85); width: 95%; max-width: 480px; box-shadow: 0 0 20px #00ff00; }
        
        /* Stats Box (Original Style) */
        .stats-box { border: 1px solid #00ff00; padding: 10px; margin-bottom: 15px; font-size: 1.2em; border-radius: 8px; }
        
        input { background: transparent; border: 1px solid #00ff00; color: #fff; padding: 12px; margin: 8px 0; border-radius: 6px; width: 90%; font-size: 1em; outline: none; }
        input::placeholder { color: rgba(0,255,0,0.5); }
        
        .btn { display: block; width: 95%; padding: 14px; margin: 12px auto; border: 1px solid #00ff00; background: transparent; color: #00ff00; cursor: pointer; border-radius: 6px; font-size: 1.1em; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #00ff00; color: #000; box-shadow: 0 0 15px #00ff00; }
        
        .stop-btn { border-color: #ff0000; color: #ff0000; margin-top: 20px; }
        .stop-btn:hover { background: #ff0000; color: #fff; box-shadow: 0 0 15px #ff0000; }

        /* Blinking Active Status */
        .status-active { margin-top: 10px; font-weight: bold; font-size: 1.1em; display: none; color: #00ff00; text-transform: uppercase; animation: blinker 0.8s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; text-shadow: 0 0 20px #00ff00; } }

        /* Mobile Responsive */
        @media (max-width: 600px) {
            .logo { font-size: 1.5em; }
            .panel { width: 98%; padding: 15px; }
            .btn { font-size: 1em; padding: 12px; }
        }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    
    <div class="logo">SYSTEM OVERRIDE v2.0</div>
    
    <div class="panel">
        <div class="stats-box">
            Hits: <span id="hits">0</span> | Bad: <span id="bad">0</span>
        </div>
        
        <div class="status-active" id="status_msg">⚡ EXPLOIT IS ACTIVE ⚡</div>
        
        <input type="text" id="tg_id" placeholder="Enter ID (7404780411)">
        <input type="text" id="tg_token" placeholder="Enter Token (835767...)">
        
        <hr style="border: 0.5px solid #333; margin: 20px 0;">
        
        <button class="btn" onclick="start('btn1')">high followers 😍 by peter (2).py</button>
        <button class="btn" onclick="start('btn3')">high followers file by team tx.py</button>
        <button class="btn" onclick="start('btn2')">2k14 to 2k15 file.py</button>
        <button class="btn" onclick="start('btn4')">5L by Peter .py</button>
        <button class="btn" onclick="start('btn5')">2k13 to 2k15 by peter.py.py</button>
        
        <button class="btn stop-btn" onclick="stopAll()">TERMINATE ALL EXPLOITS</button>
    </div>

    <script>
        // --- MATRIX RAIN ANIMATION ---
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=%@#&".split("");
        const fontSize = 16; const columns = canvas.width / fontSize;
        const rain = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0"; ctx.font = fontSize + "px Courier New";
            for (let i = 0; i < rain.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, rain[i] * fontSize);
                if (rain[i] * fontSize > canvas.height && Math.random() > 0.975) rain[i] = 0;
                rain[i]++;
            }
        }
        setInterval(drawMatrix, 35);

        // --- DASHBOARD LOGIC ---
        function start(scriptName) {
            const id = document.getElementById('tg_id').value;
            const token = document.getElementById('tg_token').value;
            if(!id || !token) { alert("Bhai ID aur Token toh daal de!"); return; }

            fetch('/start', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({script: scriptName, id: id, token: token})
            }).then(r => r.json()).then(data => {
                document.getElementById('status_msg').style.display = 'block';
                alert(data.message);
            });
        }

        function stopAll() {
            fetch('/stop', {method: 'POST'}).then(r => r.json()).then(data => {
                document.getElementById('status_msg').style.display = 'none';
                alert(data.message);
            });
        }

        // Live Stats Update
        setInterval(() => {
            fetch('/get_stats').then(r => r.json()).then(data => {
                document.getElementById('hits').innerText = data.hits;
                document.getElementById('bad').innerText = data.bad;
                if(data.active_script !== "None") {
                    document.getElementById('status_msg').style.display = 'block';
                } else {
                    document.getElementById('status_msg').style.display = 'none';
                }
            });
        }, 2000);
    </script>
</body>
</html>
