<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM OVERRIDE v2.0 | PETER EDITION</title>
    <style>
        body { background-color: #000; color: #00ff00; font-family: 'Courier New', monospace; text-align: center; margin: 0; padding: 20px; overflow-x: hidden; }
        .logo { font-size: 1.8em; color: #00ff00; text-shadow: 0 0 10px #00ff00; margin-bottom: 20px; }
        .panel { border: 2px solid #00ff00; padding: 20px; display: inline-block; border-radius: 10px; box-shadow: 0 0 15px #00ff00; background-color: rgba(0,0,0,0.9); width: 90%; max-width: 500px; margin: 20px 0; }
        input { background: transparent; border: 1px solid #00ff00; color: #fff; padding: 12px; margin: 5px; border-radius: 5px; width: 90%; }
        .btn { display: block; width: 95%; padding: 15px; margin: 10px auto; border: 1px solid #00ff00; background: transparent; color: #00ff00; cursor: pointer; font-weight: bold; border-radius: 5px; font-size: 1em; }
        .btn:hover { background: #00ff00; color: #000; }
        .stop { border-color: red; color: red; margin-top: 15px; }
        .stop:hover { background: red; color: #fff; }
        .stats { margin: 10px; font-size: 1.1em; color: #ff00ff; }
        
        #matrix-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; }
        .section-title { font-size: 1.1em; color: #ff00ff; border-bottom: 1px solid #333; margin-top: 10px; padding-bottom: 5px; }

        @media (max-width: 600px) {
            .logo { font-size: 1.5em; }
            .panel { width: 95%; padding: 10px; }
            .btn { font-size: 0.9em; padding: 12px; }
        }
    </style>
</head>
<body>
    <canvas id="matrix-canvas"></canvas>
    <div class="logo">💀 SYSTEM OVERRIDE v2.0 💀</div>
    
    <div class="panel">
        <div class="stats">HITS: <span id="hits">0</span> | BAD: <span id="bad">0</span></div>
        <div class="stats">ACTIVE: <span id="active">None</span></div>
        <br>
        <input type="text" id="id" placeholder="Telegram ID (7404780411)">
        <input type="text" id="token" placeholder="Bot Token (835767...)">
        <br>
        <div class="section-title">--- HIGH FOLLOWER FILTER ---</div>
        <button class="btn" onclick="start('btn1')">HIGH FOLLOWER 😎 BY PETER</button>
        <button class="btn" onclick="start('btn2')">2k14 to 2k15 High Follower</button>
        <button class="btn" onclick="start('btn3')">HIGH FOLLOWER | TEAM TX CORE</button>
        <br>
        <div class="section-title">--- TERMUX ADVANCED TOOL ---</div>
        <button class="btn" onclick="start('legacy')">PETER LEGACY (2k12-14 Combo)</button>
        <button class="btn" onclick="start('meta')">PETER META (Bizz Combo)</button>
        <br>
        <div class="section-title">--- CORE OPTIONS ---</div>
        <button class="btn stop" onclick="stopAll()">TERMINATE ALL EXPLOITS</button>
    </div>

    <script>
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('get_context_2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789".split("");
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];
        for (let x = 0; x < columns; x++) drops[x] = 1;
        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0"; ctx.font = fontSize + "px Courier New";
            for (let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 33);
        
        function start(script) {
            const id = document.getElementById('id').value;
            const token = document.getElementById('token').value;
            fetch('/start', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({script: script, id: id, token: token})
            }).then(r => r.json()).then(d => alert(d.message));
        }

        function stopAll() {
            fetch('/stop', {method: 'POST'}).then(r => r.json()).then(d => alert(d.message));
        }

        setInterval(() => {
            fetch('/get_stats').then(r => r.json()).then(data => {
                document.getElementById('hits').innerText = data.hits;
                document.getElementById('bad').innerText = data.bad;
                document.getElementById('active').innerText = data.active_script;
            });
        }, 2000);
    </script>
</body>
</html>
